<!DOCTYPE html>
<html lang="es">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora Ximena Ortiz</title>
    <STyle>
        html, body{
            height: 100%;
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
        }
        body{
            display: flex;
            flex-direction: column;
            text-align: center; 
        }
        header{
            padding: 20px;
            background-color: rgb(255, 174, 224);
        }
        main{
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            color: rgb(179, 202, 255);
        }
        footer{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            border-top: 1px solid black;
            background-color: rgb(185, 208, 255);
        }
        h1 {
            color: white;
            text-shadow:
            0 0 5px #83cfff,
            0 0 10px #83cfff,
            0 0 20px #83cfff,
            0 0 40px #83cfff;
        }
        .logo {
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.2);
        }
        .semana {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .semana:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
    </STyle>
</head>
<body>
    <header>
        <h1>Bitácora Segunda y Tercera Unidad </h1>
    </header>
    <main>
        <h4>Contenido de la página WEB</h4>
        <div class="semana">
            <h3>Semana 1</h3>
            <p>Aprendí sobre HTML básico...</p>
            <iframe src="recursos/pdf/Intarduinoxo.pdf" width="100%" height="500px">
        </div>
        <div class="semana">
            <h3>Semana 2 circuito</h3>
            <p>Aprendí sobre CSS...</p>
            <iframe src="primer circuito ximena .png" width="100%" height="500px">
            
            
        </div>
    </main>
    <footer>
        <span>@ximee_ortiz08</span>
        <img class="logo" src="https://www.capouilliez.edu.gt/assets/img/logo.png" height="50" width="200">
    </footer>
</body>
</html>
