    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
        }
        body {
            display: flex;
            flex-direction: column;
            text-align: center; 
        }
        header {
            padding: 20px;
            background-color: rgb(255, 174, 224);
        }
        main {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            color: #333; /* Cambiado a un tono legible sobre fondo blanco */
        }
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            border-top: 1px solid black;
            background-color: rgb(185, 208, 255);
        }
        h1 {
            color: white;
            text-shadow:
                0 0 5px #83cfff,
                0 0 10px #83cfff,
                0 0 20px #83cfff,
                0 0 40px #83cfff;
        }
        .logo {
            transition: transform 0.3s ease;
        }
        .logo:hover {
            transform: scale(1.2);
        }
        .semana {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .semana:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .semana img, .semana video {
            max-width: 100%;
            border-radius: 8px;
            height: auto;
        }
    </style>
</head>
